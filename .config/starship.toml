## FIRST LINE/ROW: Info & Status
# First param в”Җв”Ң
[username]
format = " [в•ӯв”Җ$user]($style)@"
style_user = "bold green"
style_root = "bold white"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold green"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "green"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = ""

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "white"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"
disabled = true

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
disabled = false


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
full_symbol = "п•ё "
charging_symbol = "п–ғ "
discharging_symbol = "п–Ӯ "
disabled = true

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 15
style = "bold red"
disabled = true

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 50
style = "bold yellow"
disabled = true

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
threshold = 80
style = "bold green"
disabled = true

# Prompt: optional param 1
[time]
format = " рҹ•ҷ $time($style)\n"
time_format = "%T"
style = "bright-white"
disabled = true

# Prompt: param 2 в””в”Җ
[character]
success_symbol = " [в•°в”Җ>](bold green)"
error_symbol = " [Г—](bold green)"

# SYMBOLS
[status]
symbol = "рҹ”ҙ"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

[custom.pnpm]
command = "pnpm -v"
files = ["pnpm-lock.yaml"]
