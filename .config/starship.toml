[username]
format = " [в•ӯв”Җ$user]($style)@"
style_user = "bold green"
style_root = "bold white"
show_always = true

[hostname]
format = "[$hostname]($style) in "
style = "bold green"
trim_at = "-"
ssh_only = false
disabled = false

[directory]
style = "green"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = ""

[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
disabled = false

[character]
success_symbol = " [в•°в”Җ>](bold green)"
error_symbol = " [Г—](bold green)"

[status]
symbol = "рҹ”ҙ"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

[custom.pnpm]
command = "pnpm -v"
detect_files = ["pnpm-lock.yaml"]
style = "bold fg:#f69220"
symbol = "оЎҘ "

[bun]
disabled = true

[custom.bun]
command = "bun -v"
detect_files = ["bun.lock", "bun.lockb", "bunfig.toml"]
style = "bold fg:#fbf0df"
symbol = "оқҜ "

[custom.yarn]
command = "yarn -v"
detect_files = ["yarn.lock"]
style = "bold fg:#2188b6"
symbol = "оҡ§ "

[custom.npm]
command = "npm -v"
detect_files = ["package-lock.json"]
style = "bold fg:#ea2039"
symbol = "оңһ "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "

[git_branch]
symbol = "пҗҳ "

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[nodejs]
symbol = "оүҸ "

[php]
symbol = "оҳҲ "

[python]
symbol = "оҳҶ "

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[swift]
symbol = "пҜЈ "
